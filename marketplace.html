
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">
<a href="index.html">Home</a>
<a href="tours.html">Tours</a>
<a href="map.html">Map</a>
</nav>

<h2 class="section-title">ARBO Marketplace</h2>

<div id="products" class="grid"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwIRpvQezzXayJ8N3S_gpvz6yZxtLTmZp6RXrN-u7w7M4UfzqVfvLz-DPIpqNTKedK17Q/exec"

fetch(API+"?action=getAllProducts")
.then(r=>r.json())
.then(products=>{

const grid=document.getElementById("products")

products.forEach(p=>{

grid.innerHTML+=`
<div class="card">

<img src="images/${p.image}" onerror="this.src='https://picsum.photos/200/200'">

<div class="card-content">

<h3>${p.name}</h3>
<p>₱${p.price}</p>

<button onclick="order('${p.id}')">Order</button>

</div>

</div>
`

})

})

function order(id){

const name=prompt("Your Name")
const phone=prompt("Phone Number")

fetch(API,{
method:"POST",
body:JSON.stringify({
action:"order",
product:id,
customer:name,
phone:phone,
quantity:1
})
})

alert("Order sent!")

}

</script>

</body>
</html>
