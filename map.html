
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ARBO Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
#map{height:600px;}
</style>

</head>

<body>

<h1>ARBO Map</h1>

<div id="map"></div>

<script>

var map = L.map('map').setView([13.6,123.2],8);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

L.marker([13.63,123.19]).addTo(map)
.bindPopup("Sample ARBO Farm");

</script>

</body>
</html>
