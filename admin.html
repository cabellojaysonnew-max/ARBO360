
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<h2>Admin</h2>

<a onclick="show('arbos')">ARBOs</a>
<a onclick="show('products')">Products</a>
<a onclick="show('orders')">Orders</a>
<a onclick="show('analytics')">Analytics</a>

</aside>

<main class="content">

<section id="arbos">
<h2>ARBO Management</h2>
<p>Manage ARBO data.</p>
</section>

<section id="products" class="hidden">
<h2>Products</h2>
<p>Manage products.</p>
</section>

<section id="orders" class="hidden">
<h2>Orders</h2>
<p>View orders.</p>
</section>

<section id="analytics" class="hidden">
<h2>Analytics</h2>
<p>Tourism analytics dashboard.</p>
</section>

</main>

</div>

<script>

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")
}

</script>

</body>
</html>
