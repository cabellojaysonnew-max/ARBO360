<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ARBO Virtual Tours</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="nav">
<a href="index.html">Home</a>
<a href="tours.html">ARBO Tours</a>
<a href="map.html">Map</a>
<a href="marketplace.html">Marketplace</a>
<a href="admin.html">Admin</a>
</nav>

<h2 class="section-title">ARBO Virtual Tours</h2>

<div id="arboGrid" class="grid"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbwIRpvQezzXayJ8N3S_gpvz6yZxtLTmZp6RXrN-u7w7M4UfzqVfvLz-DPIpqNTKedK17Q/exec"

fetch(API+"?action=getARBOS")
.then(res=>res.json())
.then(data=>{

const grid=document.getElementById("arboGrid")

data.forEach(arbo=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="tours/${arbo.panorama}" 
onerror="this.src='https://picsum.photos/400/200'">

<div class="card-content">

<h3>${arbo.name}</h3>
<p>${arbo.location}</p>

<a class="tour-btn" href="tour.html?arbo=${arbo.id}">
Enter 360 Tour
</a>

</div>
`

grid.appendChild(card)

})

})

</script>

</body>
</html>
