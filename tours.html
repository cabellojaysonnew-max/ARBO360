
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="nav">
<a href="index.html">Home</a>
<a href="tours.html">ARBO Tours</a>
<a href="map.html">Map</a>
<a href="marketplace.html">Marketplace</a>
<a href="admin.html">Admin</a>
</nav>

<h2 class="section-title">ARBO Virtual Tours</h2>

<div id="arboGrid" class="grid"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbwIRpvQezzXayJ8N3S_gpvz6yZxtLTmZp6RXrN-u7w7M4UfzqVfvLz-DPIpqNTKedK17Q/exec"

fetch(API+"?action=getARBOS")
.then(r=>r.json())
.then(data=>{
const grid=document.getElementById("arboGrid")

data.forEach(a=>{

grid.innerHTML+=`
<div class="card">

<img src="tours/${a.panorama}" onerror="this.src='https://picsum.photos/400/200'">

<div class="card-content">

<h3>${a.name}</h3>
<p>${a.location}</p>

<a href="tour.html?arbo=${a.id}">Enter 360 Tour</a>

</div>

</div>
`
})
})
</script>

</body>
</html>
