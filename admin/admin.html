
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-100">

<header class="bg-gray-800 text-white p-4 text-xl font-bold">
Admin Dashboard
</header>

<div class="p-10 max-w-lg">

<h2 class="font-bold mb-3">Add Product</h2>

<input id="name" placeholder="Product name" class="border p-2 w-full mb-2">
<input id="price" placeholder="Price" class="border p-2 w-full mb-2">
<input id="image" placeholder="Image URL" class="border p-2 w-full mb-2">

<button onclick="addProduct()" class="bg-green-600 text-white px-4 py-2 rounded">
Add Product
</button>

</div>

<script src="../js/data.js"></script>
<script src="../js/admin.js"></script>

</body>
</html>
